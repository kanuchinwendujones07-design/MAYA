<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maya's Dashboard | ADMIN PANEL</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Inter:wght@400;600;800&display=swap');

        body { background: #fbfbfb; font-family: 'Inter', sans-serif; color: #000; overflow-x: hidden; }

        /* Mobile Header */
        .mobile-header {
            display: none; background: #000; color: #fff; padding: 15px 20px;
            position: fixed; top: 0; width: 100%; z-index: 1100; justify-content: space-between; align-items: center;
        }

        /* Sidebar Navigation */
        .sidebar { 
            height: 100vh; width: 260px; position: fixed; 
            background: #000; color: #fff; padding: 40px 20px; 
            z-index: 1200; transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .sidebar-brand { font-family: 'Syncopate', sans-serif; font-size: 1.1rem; letter-spacing: 4px; margin-bottom: 50px; display: block; color: #fff; text-decoration: none; }
        .nav-link { color: #888; font-weight: 600; font-size: 0.85rem; padding: 12px 15px; border-radius: 8px; margin-bottom: 10px; transition: 0.3s; cursor: pointer; border: none; background: none; width: 100%; text-align: left; display: block; }
        .nav-link:hover, .nav-link.active { background: #222; color: #fff; }
        .nav-link i { margin-right: 12px; }

        /* Main Content */
        .main-content { margin-left: 260px; padding: 40px; transition: 0.3s; }
        .section-title { font-weight: 800; font-size: 1.5rem; margin-bottom: 30px; letter-spacing: -0.5px; }

        /* Cards & Forms */
        .admin-card { background: #fff; border: 1px solid #eee; padding: 25px; border-radius: 12px; margin-bottom: 20px; }
        .form-control { border: 1px solid #eee; padding: 12px; font-size: 0.9rem; border-radius: 8px; margin-bottom: 15px; background: #f9f9f9; }
        .btn-upload { background: #000; color: #fff; border: none; padding: 14px; border-radius: 8px; font-weight: 700; width: 100%; transition: 0.3s; }

        /* Orders List */
        .order-row { background: #fff; border: 1px solid #eee; padding: 20px; border-radius: 12px; margin-bottom: 15px; }
        .order-grid { display: grid; grid-template-columns: 1fr auto; gap: 15px; }
        .cust-details { font-size: 0.75rem; color: #666; margin-top: 10px; padding-top: 10px; border-top: 1px dashed #eee; }
        .cust-details i { color: #000; margin-right: 5px; width: 15px; }
        
        .status-badge { font-size: 9px; font-weight: 800; text-transform: uppercase; padding: 4px 10px; border-radius: 4px; margin-bottom: 8px; display: inline-block; }
        .status-paid { background: #fff3e0; color: #ef6c00; }
        .status-shipped { background: #e8f5e9; color: #2e7d32; }

        .btn-approve { background: #FF8C00; color: #fff; border: none; font-size: 0.7rem; font-weight: 800; padding: 8px 15px; border-radius: 5px; }

        /* Custom Toast */
        #toast-container { position: fixed; top: 30px; right: 30px; z-index: 9999; }
        .admin-toast { 
            background: #000; color: #fff; padding: 16px 24px; border-radius: 4px; 
            font-size: 0.75rem; font-weight: 700; margin-bottom: 10px; 
            border-left: 5px solid #FF8C00; box-shadow: 0 10px 30px rgba(0,0,0,0.2); 
            animation: slideIn 0.4s ease forwards; min-width: 200px;
        }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        /* Sidebar Overlay */
        .sidebar-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 1150; backdrop-filter: blur(2px); }

        /* Responsive Settings */
        @media (max-width: 991px) {
            .mobile-header { display: flex; }
            .sidebar { transform: translateX(-100%); }
            .sidebar.active { transform: translateX(0); }
            .sidebar-overlay.active { display: block; }
            .main-content { margin-left: 0; padding: 100px 20px 40px; }
            .order-grid { grid-template-columns: 1fr; }
            .text-end-md { text-align: left !important; margin-top: 15px; }
        }
    </style>
</head>
<body>

    <div id="toast-container"></div>
    <div id="overlay" class="sidebar-overlay" onclick="toggleSidebar()"></div>

    <header class="mobile-header">
        <span style="font-family:'Syncopate'; letter-spacing:2px; font-size:0.9rem;">MAYA ALLURE</span>
        <i class="bi bi-list fs-2" onclick="toggleSidebar()"></i>
    </header>

    <div class="sidebar" id="sidebar">
        <a href="#" class="sidebar-brand">MAYA ALLURE</a>
        <nav class="nav flex-column">
            <button class="nav-link active" id="nav-upload" onclick="showTab('upload')"><i class="bi bi-cloud-arrow-up"></i> STOREFRONT</button>
            <button class="nav-link" id="nav-orders" onclick="showTab('orders')"><i class="bi bi-cart-check"></i> ORDERS</button>
            <button class="nav-link" onclick="window.location.reload()"><i class="bi bi-arrow-clockwise"></i> REFRESH</button>
        </nav>
    </div>

    <div class="main-content">
        <div id="upload-section">
            <h2 class="section-title">Store Management</h2>
            <div class="row g-4">
                <div class="col-xl-5">
                    <div class="admin-card">
                        <h6 class="fw-bold mb-4">NEW PRODUCT</h6>
                        <input type="text" id="pName" class="form-control" placeholder="PRODUCT NAME">
                        <div class="row g-2">
                            <div class="col-6"><input type="number" id="pPrice" class="form-control" placeholder="PRICE (₦)"></div>
                            <div class="col-6"><input type="number" id="pStock" class="form-control" placeholder="IN STOCK QTY"></div>
                        </div>
                        <input type="text" id="pColors" class="form-control" placeholder="COLORS (e.g. Black, White)">
                        <label class="small text-muted mb-2 fw-bold">PRODUCT IMAGE</label>
                        <input type="file" id="pImage" class="form-control" accept="image/*">
                        <button id="uploadBtn" class="btn-upload">PUSH TO STORE</button>
                    </div>
                </div>
                <div class="col-xl-7">
                    <div class="admin-card">
                        <h6 class="fw-bold mb-4">LIVE INVENTORY</h6>
                        <div id="inventory-list"></div>
                    </div>
                </div>
            </div>
        </div>

        <div id="orders-section" style="display: none;">
            <h2 class="section-title">Order Management</h2>
            <div id="orders-list"></div>
        </div>
    </div>

    <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, push, set, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAP5BADrbyPaeR8WYVzZToWabxeVBDTo5I",
        databaseURL: "https://client-b83b3-default-rtdb.firebaseio.com/",
        projectId: "client-b83b3"
    };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // Sidebar & UI Helpers
    window.toggleSidebar = () => {
        document.getElementById('sidebar').classList.toggle('active');
        document.getElementById('overlay').classList.toggle('active');
    };

    window.notifyAdmin = (msg) => {
        const container = document.getElementById('toast-container');
        if(!container) return;
        const t = document.createElement('div');
        t.className = 'admin-toast';
        t.innerHTML = `<i class="bi bi-info-circle-fill me-2"></i> ${msg.toUpperCase()}`;
        container.appendChild(t);
        setTimeout(() => {
            t.style.opacity = '0';
            t.style.transform = 'translateX(20px)';
            t.style.transition = '0.4s';
            setTimeout(() => t.remove(), 400);
        }, 3000);
    };

    window.showTab = (tab) => {
        document.getElementById('upload-section').style.display = tab === 'upload' ? 'block' : 'none';
        document.getElementById('orders-section').style.display = tab === 'orders' ? 'block' : 'none';
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        const activeLink = document.getElementById('nav-' + tab);
        if(activeLink) activeLink.classList.add('active');
        
        if (window.innerWidth < 992 && document.getElementById('sidebar').classList.contains('active')) {
            toggleSidebar();
        }
    };

    // --- 1. SAFE INVENTORY LOGIC ---
    onValue(ref(db, 'products'), (snapshot) => {
        const list = document.getElementById('inventory-list');
        if(!list) return;
        list.innerHTML = "";
        if(!snapshot.exists()) return list.innerHTML = "<p class='text-muted small'>No items live.</p>";
        
        snapshot.forEach((child) => {
            const p = child.val();
            // SAFETY CHECK: Prevents the toUpperCase() error if name is missing
            const rawName = p.name || "Unnamed Product";
            const displayName = rawName.toUpperCase();
            const displayPrice = p.price ? Number(p.price).toLocaleString() : "0";
            
            list.innerHTML += `
                <div class="d-flex justify-content-between align-items-center mb-3 pb-3 border-bottom">
                    <div class="d-flex align-items-center">
                        <img src="${p.image || ''}" style="width: 45px; height: 45px; object-fit: cover; border-radius: 6px; margin-right: 15px;">
                        <div>
                            <h6 class="mb-0 fw-bold small">${displayName}</h6>
                            <small class="text-muted">₦${displayPrice} • <b>${p.stock || 0} IN STOCK</b></small>
                        </div>
                    </div>
                    <button onclick="window.deleteProduct('${child.key}')" class="btn btn-outline-danger btn-sm border-0"><i class="bi bi-trash"></i></button>
                </div>`;
        });
    });

    window.deleteProduct = (id) => {
        if(confirm("Permanently remove this item?")) {
            remove(ref(db, `products/${id}`));
            notifyAdmin("Product Deleted");
        }
    };

    // --- 2. UPLOAD LOGIC ---
    document.getElementById('uploadBtn').onclick = async () => {
        const btn = document.getElementById('uploadBtn');
        const fileInput = document.getElementById('pImage');
        const file = fileInput.files[0];
        const name = document.getElementById('pName').value;
        const price = document.getElementById('pPrice').value;
        const stock = document.getElementById('pStock').value;
        const colors = document.getElementById('pColors').value;

        if(!file || !name || !price || !stock) return notifyAdmin("Fill all fields");
        
        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span> PUSHING...';
        btn.disabled = true;
        
        const formData = new FormData();
        formData.append("image", file);
        
        try {
            const res = await fetch("https://api.imgbb.com/1/upload?key=6ae309e5e122f3aca2f9142fc3b2bd0a", { method: "POST", body: formData });
            const data = await res.json();

            if(!data.success) throw new Error("Image upload failed");

            await push(ref(db, 'products'), {
                name: name, 
                price: Number(price),
                stock: Number(stock),
                colors: colors,
                image: data.data.url
            });
            
            notifyAdmin("Maya Allure Inventory Updated");
            // Clear inputs
            fileInput.value = "";
            document.getElementById('pName').value = "";
            document.getElementById('pPrice').value = "";
            document.getElementById('pStock').value = "";
            document.getElementById('pColors').value = "";

        } catch (e) { 
            console.error(e);
            notifyAdmin("Upload Error: " + e.message); 
        } finally {
            btn.innerHTML = "PUSH TO STORE"; 
            btn.disabled = false;
        }
    };

    // --- 3. ORDERS LOGIC ---
    onValue(ref(db, 'orders'), (snapshot) => {
        const list = document.getElementById('orders-list');
        if(!list) return;
        list.innerHTML = "";
        if(!snapshot.exists()) return list.innerHTML = "<div class='admin-card text-center text-muted'>NO ACTIVE ORDERS</div>";

        snapshot.forEach((child) => {
            const o = child.val();
            const id = child.key;
            
            // Handle different possible name fields for safety
            const customerName = o.name_cust || o.customer || o.name || "Unknown Customer";
            const productName = o.productName || o.name || "Product";
            
            list.innerHTML += `
                <div class="order-row">
                    <div class="order-grid">
                        <div>
                            <span class="status-badge status-${o.status}">${o.status}</span>
                            <h6 class="fw-800 mb-1 text-uppercase">${productName} <span class="text-muted small">(${o.color || 'N/A'})</span></h6>
                            <div class="small fw-bold">₦${Number(o.price || 0).toLocaleString()}</div>
                        </div>
                        <div class="text-end text-end-md">
                            ${o.status === 'paid' ? 
                                `<button onclick="window.approveOrder('${id}')" class="btn-approve">APPROVE</button>` : 
                                `<i class="bi bi-check-circle-fill text-success fs-5"></i>`}
                        </div>
                    </div>
                    
                    <div class="cust-details">
                        <div class="row g-2">
                            <div class="col-md-4"><i class="bi bi-person"></i> ${customerName}</div>
                            <div class="col-md-4"><i class="bi bi-envelope"></i> ${o.email || 'N/A'}</div>
                            <div class="col-md-4"><i class="bi bi-telephone"></i> ${o.phone || 'N/A'}</div>
                            <div class="col-12 mt-2"><i class="bi bi-geo-alt"></i> ${o.location || 'N/A'}</div>
                        </div>
                    </div>
                </div>`;
        });
    });

    window.approveOrder = async (orderId) => {
        await update(ref(db, `orders/${orderId}`), { status: 'shipped' });
        notifyAdmin("Order approved for dispatch");
    };
</script>
</body>
</html>
