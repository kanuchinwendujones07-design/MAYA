<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VRA.SZ | OFFICIAL STORE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <script src="https://js.paystack.co/v2/inline.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Inter:wght@400;600;900&display=swap');
        
        :root { --orange-btn: #FF8C00; }
        body { background: #fff; font-family: 'Inter', sans-serif; color: #000; overflow-x: hidden; }
        .hidden { display: none !important; }

        /* Navigation */
        .vrasz-nav { padding: 25px; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid #eee; }
        .brand-logo { font-family: 'Syncopate', sans-serif; font-size: 1.2rem; letter-spacing: 5px; text-decoration: none; color: #000; font-weight: 900; }
        
        /* HERO Section */
        .hero-section { height: 80vh; background: #000; position: relative; overflow: hidden; margin-bottom: 50px; }
        .hero-img { width: 100%; height: 100%; object-fit: cover; opacity: 0.8; }
        .hero-overlay { position: absolute; bottom: 60px; left: 40px; }
        .hero-title { font-family: 'Syncopate', sans-serif; font-size: clamp(2.5rem, 8vw, 4.5rem); letter-spacing: -2px; color: #fff; line-height: 0.9; }

        /* Search Bar */
        .search-bar { border: none; border-bottom: 2px solid #eee; border-radius: 0; padding: 10px 0; font-weight: 800; font-size: 0.75rem; letter-spacing: 2px; text-align: center; text-transform: uppercase; margin-bottom: 40px; }
        .search-bar:focus { box-shadow: none; border-color: #000; }

        /* Product Cards */
        .product-card { transition: 0.3s; border: none; margin-bottom: 40px; }
        .img-wrapper { aspect-ratio: 3/4; overflow: hidden; background: #f9f9f9; border-radius: 2px; position: relative; }
        .img-wrapper img { width: 100%; height: 100%; object-fit: cover; transition: 0.6s; }

        /* Action Row */
        .action-row { display: flex; gap: 6px; align-items: center; margin-top: 12px; }
        .qty-controls { display: flex; align-items: center; border: 1.5px solid #eee; border-radius: 4px; height: 38px; background: #fff; }
        .qty-btn { background: none; border: none; padding: 0 8px; font-weight: bold; cursor: pointer; font-size: 14px; }
        .qty-num { width: 22px; text-align: center; font-size: 11px; font-weight: 900; border: none; outline: none; background: transparent; }

        .btn-add-cart { flex-grow: 1; background: var(--orange-btn); color: #fff; border: none; height: 38px; border-radius: 4px; font-size: 9px; font-weight: 900; text-transform: uppercase; display: flex; align-items: center; justify-content: center; gap: 4px; padding: 0 5px; }
        .btn-add-cart i { font-size: 12px; }

        /* Color Options */
        .color-dot { width: 14px; height: 14px; border-radius: 50%; display: inline-block; margin-right: 6px; border: 1px solid #ddd; cursor: pointer; position: relative; }
        .btn-check:checked + .color-dot::after { content: ''; position: absolute; top: -3px; left: -3px; right: -3px; bottom: -3px; border: 1px solid #000; border-radius: 50%; }

        /* Notifications & Badge */
        #toast-container { position: fixed; top: 20px; right: 20px; z-index: 10000; }
        .modern-toast { background: #000; color: #fff; padding: 12px 20px; font-size: 10px; font-weight: 800; border-left: 4px solid var(--orange-btn); margin-bottom: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .cart-icon-wrapper { position: relative; cursor: pointer; }
        .cart-count-badge { position: absolute; top: -5px; right: -8px; background: var(--orange-btn); color: #fff; font-size: 9px; font-weight: 900; padding: 2px 5px; border-radius: 10px; min-width: 18px; text-align: center; border: 2px solid #fff; }

        /* Checkout Modal */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .checkout-card { background: #fff; padding: 30px; width: 100%; max-width: 450px; }
        .modal-input { width: 100%; padding: 12px 0; border: none; border-bottom: 2px solid #eee; margin-bottom: 15px; font-size: 0.8rem; font-weight: 700; outline: none; }
        .btn-pay-now { width: 100%; background: #000; color: #fff; border: none; padding: 16px; font-weight: 900; font-size: 0.75rem; letter-spacing: 2px; text-transform: uppercase; }

        .cart-row { padding: 20px 0; border-bottom: 1px solid #eee; }
        .fw-900 { font-weight: 900; }
    </style>
</head>
<body>

    <div id="toast-container"></div>

    <div id="checkout-modal" class="modal-overlay" style="display:none;">
        <div class="checkout-card text-center">
            <h4 class="fw-900 mb-4">SHIPPING DETAILS</h4>
            <input type="text" id="custName" class="modal-input" placeholder="FULL NAME">
            <input type="email" id="custEmail" class="modal-input" placeholder="EMAIL ADDRESS">
            <input type="tel" id="custPhone" class="modal-input" placeholder="PHONE NUMBER">
            <div class="row g-2">
                <div class="col-6"><input type="text" id="custState" class="modal-input" placeholder="STATE"></div>
                <div class="col-6"><input type="text" id="custTown" class="modal-input" placeholder="TOWN/CITY"></div>
            </div>
            <button onclick="window.startPaystackProcess()" class="btn-pay-now mt-4">PAY NOW</button>
            <p class="mt-4 small text-muted pointer" onclick="document.getElementById('checkout-modal').style.display='none'">GO BACK</p>
        </div>
    </div>

    <nav class="vrasz-nav d-flex justify-content-between align-items-center">
        <a href="#" class="brand-logo" onclick="showShop()" style="font-family: 'Gill Sans', sans-serif;">Maya<span style="font-family: cursive;">Allure</span></a>
        <div class="cart-icon-wrapper" onclick="showCartPage()">
            <i class="bi bi-cart-fill fs-4"></i> <span id="cart-count" class="cart-count-badge">0</span>
        </div>
    </nav>

    <main id="shop-view">
        <section class="hero-section">
            <img src="https://images.unsplash.com/photo-1539109136881-3be0616acf4b?q=80&w=2000&auto=format&fit=crop" class="hero-img">
            <div class="hero-overlay">
                <h1 class="hero-title">ESSENTIALS<br>’26</h1>
            </div>
        </section>

        <div class="container">
            <input type="text" id="shopSearch" class="form-control search-bar" placeholder="SEARCH PIECES...">
            <div class="row" id="shop-grid"></div>
        </div>
    </main>

    <main id="cart-view" class="container mt-5 hidden">
        <h1 class="fw-900 mb-5">YOUR CART</h1>
        <div id="cart-items-container"></div>
        <div class="row mt-5 pb-5">
            <div class="col-md-5 offset-md-7">
                <div class="d-flex justify-content-between mb-2 small fw-bold"><span>SUBTOTAL</span> <span id="cart-subtotal">₦0</span></div>
                <div class="d-flex justify-content-between mb-4 h3 fw-900"><span>TOTAL</span> <span id="cart-total">₦0</span></div>
                <button class="btn-pay-now" onclick="proceedToCheckout()">CHECKOUT</button>
                <button class="btn btn-link w-100 mt-2 text-dark fw-bold text-decoration-none small" onclick="showShop()">CONTINUE SHOPPING</button>
            </div>
        </div>
    </main>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, push, set, onValue, update, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAP5BADrbyPaeR8WYVzZToWabxeVBDTo5I",
        databaseURL: "https://client-b83b3-default-rtdb.firebaseio.com/",
        projectId: "client-b83b3"
    };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let cart = JSON.parse(localStorage.getItem('vrasz_bag')) || [];
    let allProducts = [];

    window.notify = (msg) => {
        const container = document.getElementById('toast-container');
        const t = document.createElement('div');
        t.className = 'modern-toast';
        t.innerText = msg.toUpperCase();
        container.appendChild(t);
        setTimeout(() => t.remove(), 3000);
    };

    const updateCartUI = () => {
        const totalQty = cart.reduce((s, item) => s + (parseInt(item.qty) || 0), 0);
        document.getElementById('cart-count').innerText = totalQty;
        localStorage.setItem('vrasz_bag', JSON.stringify(cart));
    };

    window.showShop = () => {
        document.getElementById('shop-view').classList.remove('hidden');
        document.getElementById('cart-view').classList.add('hidden');
    };

    window.showCartPage = () => {
        document.getElementById('shop-view').classList.add('hidden');
        document.getElementById('cart-view').classList.remove('hidden');
        renderCartItems();
    };

    window.changeQty = (id, amt) => {
        const input = document.getElementById(`qty-${id}`);
        let val = parseInt(input.value) + amt;
        if(val < 1) val = 1;
        input.value = val;
    };

    onValue(ref(db, 'products'), (snapshot) => {
        allProducts = [];
        if (snapshot.exists()) {
            snapshot.forEach(child => {
                allProducts.push({ id: child.key, ...child.val() });
            });
        }
        renderGrid(allProducts);
    });

    const renderGrid = (products) => {
        const grid = document.getElementById('shop-grid');
        const isSearching = document.getElementById('shopSearch').value.length > 0;
        grid.innerHTML = "";
        
        const colClass = isSearching ? "col-6" : "col-md-4";

        products.forEach((p) => {
            const stock = p.stock || 0;
            const isOutOfStock = stock <= 0;
            const colors = p.colors ? p.colors.split(',') : ['Default'];
            
            const colorHtml = colors.map((c, i) => `
                <input type="radio" class="btn-check" name="clr-${p.id}" id="clr-${p.id}-${i}" value="${c.trim()}" ${i==0?'checked':''}>
                <label class="color-dot" style="background:${c.trim().toLowerCase()}" for="clr-${p.id}-${i}"></label>
            `).join('');

            grid.innerHTML += `
                <div class="${colClass}">
                    <div class="product-card ${isOutOfStock ? 'opacity-75' : ''}">
                        <div class="img-wrapper">
                            <img src="${p.image || ''}">
                        </div>
                        <div class="pt-3">
                            <div class="d-flex flex-column mb-1">
                                <span class="small fw-900 text-uppercase" style="font-size:10px; line-height:1.2;">${(p.name || 'ITEM').toUpperCase()}</span>
                                <span class="small fw-bold" style="font-size:10px;">₦${(p.price || 0).toLocaleString()}</span>
                            </div>
                            <div class="d-flex align-items-center mb-2">${colorHtml}</div>
                            <div class="action-row">
                                <div class="qty-controls">
                                    <button class="qty-btn" onclick="window.changeQty('${p.id}', -1)">-</button>
                                    <input type="text" id="qty-${p.id}" class="qty-num" value="1" readonly>
                                    <button class="qty-btn" onclick="window.changeQty('${p.id}', 1)">+</button>
                                </div>
                                <button class="btn-add-cart" ${isOutOfStock ? 'disabled' : ''} 
                                    onclick="window.addToCart('${p.id}', '${(p.name || 'ITEM').replace(/'/g, "\\'")}', ${p.price || 0}, '${p.image || ''}')">
                                    <i class="bi bi-cart-plus-fill"></i> ${isOutOfStock ? 'SOLD' : 'ADD'}
                                </button>
                            </div>
                        </div>
                    </div>
                </div>`;
        });
    };

    window.addToCart = (id, name, price, img) => {
        const qty = parseInt(document.getElementById(`qty-${id}`).value);
        const colorInput = document.querySelector(`input[name="clr-${id}"]:checked`);
        const color = colorInput ? colorInput.value : 'Default';
        
        const existing = cart.find(item => item.id === id && item.color === color);
        if(existing) existing.qty += qty;
        else cart.push({ id, name, price, img, color, qty });
        
        updateCartUI();
        notify(`${name} ADDED`);
    };

    window.renderCartItems = () => {
        const container = document.getElementById('cart-items-container');
        if(cart.length === 0) {
            container.innerHTML = "<p class='py-5 text-center fw-bold'>BAG IS EMPTY.</p>";
            document.getElementById('cart-subtotal').innerText = "₦0";
            document.getElementById('cart-total').innerText = "₦0";
            return;
        }
        container.innerHTML = cart.map((item, i) => `
            <div class="row cart-row mx-0 align-items-center">
                <div class="col-3 col-md-2"><img src="${item.img}" style="width:100%; border-radius:2px;"></div>
                <div class="col-7 col-md-8">
                    <h6 class="fw-900 mb-0">${item.name} (x${item.qty})</h6>
                    <small class="text-muted">${item.color}</small>
                    <p class="fw-bold mb-0">₦${(item.price * item.qty).toLocaleString()}</p>
                </div>
                <div class="col-2 text-end"><i class="bi bi-trash3 pointer" onclick="window.removeItem(${i})"></i></div>
            </div>`).join('');
        const total = cart.reduce((s, item) => s + (item.price * item.qty), 0);
        document.getElementById('cart-subtotal').innerText = `₦${total.toLocaleString()}`;
        document.getElementById('cart-total').innerText = `₦${total.toLocaleString()}`;
    };

    window.removeItem = (i) => {
        cart.splice(i, 1);
        updateCartUI();
        renderCartItems();
    };

    document.getElementById('shopSearch').addEventListener('input', (e) => {
        const term = e.target.value.toLowerCase();
        renderGrid(allProducts.filter(p => (p.name || '').toLowerCase().includes(term)));
    });

    window.proceedToCheckout = () => {
        if(cart.length === 0) return;
        document.getElementById('checkout-modal').style.display = 'flex';
    };

    window.startPaystackProcess = () => {
        const email = document.getElementById('custEmail').value;
        if(!email) return alert("Email required");
        const total = cart.reduce((s, item) => s + (item.price * item.qty), 0);
        const paystack = new PaystackPop();
        paystack.newTransaction({
            key: 'pk_live_d093f9a81946dbccfbd408b0d1fc270553937ecb',
            email: email,
            amount: total * 100,
            onSuccess: (trx) => {
                cart.forEach(item => {
                    push(ref(db, 'orders'), { ...item, email, status: 'paid', date: Date.now() });
                    update(ref(db, `products/${item.id}`), { stock: increment(-item.qty) });
                });
                cart = [];
                localStorage.removeItem('vrasz_bag');
                location.reload();
            }
        });
    };

    updateCartUI();
</script>
</body>
</html>
